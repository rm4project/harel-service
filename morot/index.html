<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="קריאת שירות" />
  <title>פתיחת קריאת שירות – הראל</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #16162a;
      --surface: #22223a;
      --surface2: #2a2a48;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f8;
      --text2: #9090b8;
      --text3: #5a5a88;
      --accent: #7c6af7;
      --accent2: #a394ff;
      --accent-bg: rgba(124,106,247,0.12);
      --green: #3dd68c;
      --green-bg: rgba(61,214,140,0.1);
      --red: #ff6b6b;
      --red-bg: rgba(255,107,107,0.1);
      --amber: #ffb347;
      --radius: 14px;
      --radius-sm: 8px;
      --font: 'Heebo', sans-serif;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-icon { font-size: 20px; }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .topbar-sub { font-size: 12px; color: var(--text2); margin-right: auto; }

    .content { padding: 1.5rem 1.25rem; max-width: 560px; margin: 0 auto; }

    .page-header { margin-bottom: 1.75rem; }
    .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text2); }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm); padding: 11px 13px; color: var(--text);
      font-size: 15px; font-family: var(--font); transition: var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); background: var(--surface2); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
    .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .form-select option { background: var(--bg2); color: var(--text); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .type-card {
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .type-card:hover { border-color: var(--border2); background: var(--surface2); }
    .type-card.sel-tech { border-color: #3dd68c; background: rgba(61,214,140,0.08); }
    .type-card.sel-maint { border-color: var(--amber); background: rgba(255,179,71,0.08); }
    .type-card-icon { font-size: 26px; margin-bottom: 6px; }
    .type-card-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .type-card.sel-tech .type-card-label { color: #3dd68c; }
    .type-card.sel-maint .type-card-label { color: var(--amber); }

    .quick-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .qtag {
      background: var(--surface); border: 1.5px solid var(--border2);
      color: var(--text2); padding: 5px 13px; border-radius: 20px;
      font-size: 13px; cursor: pointer; transition: var(--transition); font-family: var(--font);
    }
    .qtag:hover, .qtag.sel { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }

    .prio-row { display: flex; gap: 8px; }
    .prio-btn {
      flex: 1; padding: 10px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border2); background: var(--surface);
      color: var(--text2); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: var(--font); transition: var(--transition); text-align: center;
    }
    .prio-btn.sel-normal { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .prio-btn.sel-urgent { background: var(--red-bg); border-color: var(--red); color: var(--red); }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 16px;
      font-weight: 700; font-family: var(--font); cursor: pointer;
      margin-top: 0.75rem; transition: var(--transition); letter-spacing: 0.3px;
    }
    .submit-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .toast {
      background: var(--green-bg); border: 1px solid rgba(61,214,140,0.3);
      color: var(--green); padding: 13px 16px; border-radius: var(--radius-sm);
      font-size: 14px; margin-bottom: 1.25rem; display: none;
      animation: fadeIn 0.2s ease;
    }
    .error-toast {
      background: var(--red-bg); border: 1px solid rgba(255,107,107,0.3);
      color: var(--red); padding: 13px 16px; border-radius: var(--radius-sm);
      font-size: 14px; margin-bottom: 1.25rem; display: none;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .saved-bar {
      background: var(--accent-bg); border: 1px solid rgba(124,106,247,0.2);
      border-radius: var(--radius-sm); padding: 9px 13px;
      display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;
      font-size: 13px; color: var(--accent2);
    }
    .saved-bar-change { font-size: 12px; color: var(--text3); cursor: pointer; margin-right: auto; text-decoration: underline; }
    .saved-bar-change:hover { color: var(--text2); }


    .image-upload-area {
      border: 2px dashed var(--border2);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--accent); background: var(--surface2); }
    .image-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .image-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: var(--radius-sm); margin-top: 8px; display: none; }
    .image-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .image-selected { font-size: 13px; color: var(--accent); margin-top: 4px; display: none; }
    .image-error { font-size: 12px; color: var(--red); margin-top: 4px; display: none; }
    @media (max-width: 480px) {
      .row2 { grid-template-columns: 1fr; }
      .content { padding: 1rem; }
    }
  </style>

        <div class="type-card-label">מחשוב</div>
      </div>
      <div class="type-card" id="card-maint" onclick="selectType('maint')">
        <div class="type-card-icon">🔧</div>
        <div class="type-card-label">אב-בית</div>
      </div>
    </div>
  </div>

  <div class="form-group" id="quick-group" style="display:none">
    <label class="form-label">תיוג מהיר</label>
    <div class="quick-tags" id="quick-tags"></div>
  </div>

  <div class="form-group">
    <label class="form-label">תיאור הבעיה</label>
    <textarea class="form-textarea" id="f-desc" placeholder="תאר/י בקצרה מה לא עובד..."></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">דחיפות</label>
    <div class="prio-row">
      <button class="prio-btn sel-normal" id="prio-normal" onclick="setPrio('normal')">רגיל</button>
      <button class="prio-btn" id="prio-urgent" onclick="setPrio('urgent')">🔴 דחוף</button>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">תמונה (אופציונלי — תמונה אחת בלבד)</label>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:var(--transition);" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
        <input type="file" id="f-image" accept="image/*" onchange="onImageSelect(this)" style="display:none;" />
        📁 בחר מהגלריה
      </label>
      <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:var(--transition);" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
        <input type="file" id="f-camera" accept="image/*" capture="environment" onchange="onImageSelect(this)" style="display:none;" />
        📸 צלם עכשיו
      </label>
    </div>
    <div id="image-preview-area" style="display:none;position:relative;">
      <img id="image-preview" style="width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius-sm);border:1px solid var(--border2);" />
      <button onclick="clearImage()" style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:20px;padding:3px 10px;font-size:12px;cursor:pointer;">✕ הסר</button>
    </div>
    <div id="image-selected" class="image-selected"></div>
    <div id="image-error" class="image-error"></div>
    <div class="image-hint">התמונה תדחס אוטומטית • JPG, PNG, HEIC</div>
  </div>

  <div id="toast" class="toast" style="margin-bottom:0.75rem;"></div>
  <button class="submit-btn" id="submit-btn" onclick="submitTicket()">שלח קריאה →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = supabase.createClient(
  'https://ikoaeeaqfglqdouxyvrp.supabase.co',
  'sb_publishable_QGW0QwQ5SR4iy5_BdwAz6Q__BScYsca'
);

// ── EMAIL MEMORY ──
const STORAGE_KEY = 'harel_user';

function loadSavedUser() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.name) document.getElementById('f-name').value = saved.name;
    // כיתה/מיקום לא נשמר — משתנה בכל קריאה
    if (saved.email) {
      document.getElementById('email-saved-bar').style.display = 'flex';
      document.getElementById('saved-email-display').textContent = saved.email;
      document.getElementById('email-field-group').style.display = 'none';
    }
  } catch(e) {}
}

function clearSavedEmail() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    delete saved.email;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  } catch(e) {}
  document.getElementById('email-saved-bar').style.display = 'none';
  document.getElementById('email-field-group').style.display = 'block';
  document.getElementById('f-email').value = '';
  document.getElementById('f-email').focus();
}

function getSavedEmail() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}').email || '';
  } catch(e) { return ''; }
}

function saveUser(name, email) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ name, email }));
  } catch(e) {}
}

const QUICK_TAGS = {
  tech: ['מקרן','מחשב','אינטרנט','מדפסת','מסך','רמקול'],
  maint: ['ברז','תאורה','דלת','חלון','ריח','חשמל','מיזוג']
};

let selectedType = '';
let selectedTag = '';
let prio = 'normal';

function selectType(type) {
  selectedType = type;
  document.getElementById('card-tech').className = 'type-card' + (type === 'tech' ? ' sel-tech' : '');
  document.getElementById('card-maint').className = 'type-card' + (type === 'maint' ? ' sel-maint' : '');
  const grp = document.getElementById('quick-group');
  const con = document.getElementById('quick-tags');
  grp.style.display = 'block';
  selectedTag = '';
  con.innerHTML = QUICK_TAGS[type].map(t =>
    `<button class="qtag" onclick="selectTag(this,'${t}')">${t}</button>`
  ).join('');
}

function selectTag(el, tag) {
  document.querySelectorAll('.qtag').forEach(q => q.classList.remove('sel'));
  el.classList.add('sel');
  selectedTag = tag;
  const desc = document.getElementById('f-desc');
  if (!desc.value) desc.value = tag + ' – ';
  desc.focus();
}

function setPrio(p) {
  prio = p;
  document.getElementById('prio-normal').className = 'prio-btn' + (p === 'normal' ? ' sel-normal' : '');
  document.getElementById('prio-urgent').className = 'prio-btn' + (p === 'urgent' ? ' sel-urgent' : '');
}


let selectedImageFile = null;

function onImageSelect(input) {
  const file = input.files[0];
  const errorEl = document.getElementById('image-error');
  const selectedEl = document.getElementById('image-selected');
  const preview = document.getElementById('image-preview');
  const previewArea = document.getElementById('image-preview-area');

  errorEl.style.display = 'none';
  selectedEl.style.display = 'none';
  previewArea.style.display = 'none';

  if (!file) { selectedImageFile = null; return; }

  // דחס תמונה אוטומטית ל-500KB
  compressImage(file, 500 * 1024, (compressed, dataUrl) => {
    selectedImageFile = compressed;
    selectedEl.textContent = '✓ ' + file.name + ' (דוחס אוטומטית)';
    selectedEl.style.display = 'block';
    preview.src = dataUrl;
    previewArea.style.display = 'block';
  });
}

function compressImage(file, maxBytes, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let quality = 0.8;
      let width = img.width;
      let height = img.height;

      // הקטן מידות אם גדול מדי
      const MAX_DIM = 1200;
      if (width > MAX_DIM || height > MAX_DIM) {
        const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      // הקטן quality עד שהגודל מתאים
      const tryCompress = (q) => {
        canvas.toBlob(blob => {
          if (blob.size <= maxBytes || q <= 0.1) {
            const dataUrl = canvas.toDataURL('image/jpeg', q);
            const compressed = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' });
            callback(compressed, dataUrl);
          } else {
            tryCompress(q - 0.1);
          }
        }, 'image/jpeg', q);
      };
      tryCompress(quality);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  selectedImageFile = null;
  document.getElementById('f-image').value = '';
  document.getElementById('f-camera').value = '';
  document.getElementById('image-preview-area').style.display = 'none';
  document.getElementById('image-selected').style.display = 'none';
}

async function uploadImage(ticketId) {
  if (!selectedImageFile) return null;
  const ext = selectedImageFile.name.split('.').pop();
  const path = `ticket-${ticketId}-${Date.now()}.${ext}`;
  const { data, error } = await sb.storage
    .from('ticket-images')
    .upload(path, selectedImageFile, { contentType: selectedImageFile.type });
  if (error) { console.error('upload error:', error); return null; }
  const { data: urlData } = sb.storage.from('ticket-images').getPublicUrl(path);
  return urlData.publicUrl;
}

async function submitTicket() {
  const name = document.getElementById('f-name').value.trim();
  const cls = document.getElementById('f-class').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const emailInput = document.getElementById('f-email').value.trim();
  const email = emailInput || getSavedEmail();
  if (!name && !cls && !selectedType && !desc) { alert('נא למלא את כל השדות ולבחור סוג קריאה'); return; }
  if (!name) { alert('נא למלא את שמך'); document.getElementById('f-name').focus(); return; }
  if (!cls) { alert('נא למלא כיתה / מיקום'); document.getElementById('f-class').focus(); return; }
  if (!selectedType) { alert('נא לבחור סוג קריאה — מחשוב או אב-בית'); return; }
  if (!desc) { alert('נא לתאר את הבעיה'); document.getElementById('f-desc').focus(); return; }
  if (emailInput && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput)) {
    alert('כתובת המייל אינה תקינה. אנא בדוק/י ונסה/י שנית.');
    document.getElementById('f-email').focus();
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'שולח...';

  const { data: insertData, error } = await sb.from('tickets').insert({
    name, cls, type: selectedType,
    tag: selectedTag || null,
    description: desc, prio, done: false,
    email: email || null
  }).select().single();

  btn.disabled = false;
  btn.textContent = 'שלח קריאה →';

  if (error) {
    document.getElementById('error-toast').style.display = 'block';
    setTimeout(() => document.getElementById('error-toast').style.display = 'none', 4000);
    return;
  }

  // העלה תמונה אם נבחרה
  if (selectedImageFile && insertData) {
    const imageUrl = await uploadImage(insertData.id);
    if (imageUrl) {
      await sb.from('tickets').update({ image_url: imageUrl }).eq('id', insertData.id);
    }
  }

  const emailVal = document.getElementById('f-email').value.trim() || getSavedEmail();
  saveUser(name, emailVal);
  if (emailVal) {
    document.getElementById('email-saved-bar').style.display = 'flex';
    document.getElementById('saved-email-display').textContent = emailVal;
    document.getElementById('email-field-group').style.display = 'none';
  }
  document.getElementById('f-name').value = '';
  document.getElementById('f-class').value = '';
  document.getElementById('f-desc').value = '';
  clearImage();
  const sentType = selectedType;

  document.getElementById('quick-group').style.display = 'none';
  document.getElementById('card-tech').className = 'type-card';
  document.getElementById('card-maint').className = 'type-card';
  selectedType = ''; selectedTag = '';
  setPrio('normal');

  const toast = document.getElementById('toast');
  toast.textContent = sentType === 'tech'
    ? '✓ הקריאה נשלחה ללבורנט המחשבים, קריאתך תטופל בהקדם האפשרי'
    : '✓ הקריאה נשלחה לאב הבית, קריאתך תטופל בהקדם האפשרי';
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 5000);
}


loadSavedUser();
</script>
</body>
</html>
