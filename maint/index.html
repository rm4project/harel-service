<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141008" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="אב הבית – הראל" />
  <title>אב הבית – הראל</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#141008;--bg2:#1e1808;--surface:#2a2210;--surface2:#362c14;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --text:#f5eed8;--text2:#a8904a;--text3:#6b5c28;
      --accent:#ffb347;--accent2:#ffc96b;--accent-bg:rgba(255,179,71,0.1);
      --red:#ff6b6b;--red-bg:rgba(255,107,107,0.1);
      --green:#3dd68c;--green-bg:rgba(61,214,140,0.1);
      --radius:14px;--radius-sm:8px;--font:'Heebo',sans-serif;
      --transition:0.2s cubic-bezier(0.4,0,0.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
    .topbar-title{font-size:15px;font-weight:600;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:auto;animation:pulse 2s infinite;}
    .live-label{font-size:11px;color:var(--accent);}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,179,71,0.5);}70%{box-shadow:0 0 0 8px rgba(255,179,71,0);}100%{box-shadow:0 0 0 0 rgba(255,179,71,0);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    .content{padding:1.25rem;max-width:640px;margin:0 auto;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
    .stat-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
    .stat-num{font-size:26px;font-weight:700;line-height:1;}
    .stat-lbl{font-size:11px;color:var(--text2);margin-top:4px;}
    .c-open{color:var(--accent2);}.c-urgent{color:var(--red);}.c-done{color:var(--text2);}
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap;}
    .filter-bar{display:flex;gap:6px;overflow-x:auto;}.filter-bar::-webkit-scrollbar{display:none;}
    .filt{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:var(--transition);}
    .filt.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
    .filt:hover:not(.active){background:var(--surface);color:var(--text);}
    .clear-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:var(--transition);}
    .clear-btn:hover{color:var(--text);background:var(--surface);}
    .tickets-list{display:flex;flex-direction:column;gap:10px;}
    .ticket-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;transition:var(--transition);animation:fadeIn 0.25s ease;}
    .ticket-card.is-urgent{border-right:3px solid var(--red);}
    .ticket-card.is-done{opacity:0.45;}
    .tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
    .tc-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
    .b-class{background:var(--surface2);color:var(--text2);}
    .b-tag{background:var(--accent-bg);color:var(--accent);}
    .b-urgent{background:var(--red-bg);color:var(--red);}
    .b-done{background:rgba(255,255,255,0.05);color:var(--text3);}
    .tc-time{font-size:11px;color:var(--text3);white-space:nowrap;}
    .tc-desc{font-size:14px;color:var(--text);margin-bottom:6px;line-height:1.5;}
    .tc-reporter{font-size:12px;color:var(--text2);margin-bottom:10px;}
    .tc-reporter strong{color:var(--text);font-weight:500;}
    .tc-note{font-size:12px;color:var(--accent);margin-top:6px;margin-bottom:8px;padding:6px 10px;background:var(--accent-bg);border-radius:var(--radius-sm);border-right:2px solid var(--accent);}
    .tc-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:var(--transition);}
    .tc-btn.done-btn{background:var(--accent-bg);border-color:rgba(255,179,71,0.3);color:var(--accent);}
    .tc-btn.done-btn:hover{background:rgba(255,179,71,0.2);}
    .tc-btn:hover:not(.done-btn){background:var(--surface2);color:var(--text);}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);}
    .empty-icon{font-size:42px;margin-bottom:10px;}.empty-text{font-size:14px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:1.25rem;}
    .modal{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:1.25rem;width:100%;max-width:420px;}
    .modal-title{font-size:15px;font-weight:600;margin-bottom:6px;}
    .modal-desc{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.4;}
    .modal-textarea{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--font);resize:none;min-height:80px;line-height:1.6;}
    .modal-textarea:focus{outline:none;border-color:var(--accent);}
    .modal-textarea::placeholder{color:var(--text3);}
    .modal-actions{display:flex;gap:8px;margin-top:1rem;}
    .modal-confirm{flex:1;padding:10px;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
    .modal-confirm:hover{opacity:0.85;}
    .modal-confirm:disabled{opacity:0.5;cursor:not-allowed;}
    .modal-cancel{padding:10px 16px;border:1.5px solid var(--border2);background:none;color:var(--text2);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-family:var(--font);}
    .modal-cancel:hover{background:var(--surface);color:var(--text);}
    @media(max-width:480px){.content{padding:1rem;}}
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = supabase.createClient(
  'https://ikoaeeaqfglqdouxyvrp.supabase.co',
  'sb_publishable_QGW0QwQ5SR4iy5_BdwAz6Q__BScYsca'
);

let tickets = [];
let filter = 'all';
let pendingId = null;

function timeAgo(ts) {
  const d = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (d < 60) return 'עכשיו';
  if (d < 3600) return `לפני ${Math.floor(d/60)} דק׳`;
  if (d < 86400) return `לפני ${Math.floor(d/3600)} שע׳`;
  return `לפני ${Math.floor(d/86400)} ימים`;
}

async function load() {
  const { data, error } = await sb.from('tickets').select('*').eq('type','maint').order('created_at', { ascending: false });
  if (error) { console.error('load error:', error); return; }
  tickets = data || [];
  render();
}

function render() {
  let list = [...tickets];
  if (filter === 'open')   list = list.filter(t => !t.done);
  if (filter === 'urgent') list = list.filter(t => t.prio === 'urgent' && !t.done);
  if (filter === 'done')   list = list.filter(t => t.done);

  document.getElementById('st-open').textContent   = tickets.filter(t => !t.done).length;
  document.getElementById('st-urgent').textContent = tickets.filter(t => t.prio === 'urgent' && !t.done).length;
  document.getElementById('st-done').textContent   = tickets.filter(t => t.done).length;

  const con = document.getElementById('tickets-list');
  if (!list.length) {
    con.innerHTML = '<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">אין קריאות להצגה</div></div>';
    return;
  }
  con.innerHTML = list.map(t => `
    <div class="ticket-card ${t.done ? 'is-done' : ''} ${t.prio==='urgent' && !t.done ? 'is-urgent' : ''}">
      <div class="tc-top">
        <div class="tc-badges">
          <span class="badge b-class">${t.cls}</span>
          ${t.tag ? `<span class="badge b-tag">${t.tag}</span>` : ''}
          ${t.prio==='urgent' && !t.done ? '<span class="badge b-urgent">דחוף</span>' : ''}
          ${t.done ? '<span class="badge b-done">טופל</span>' : ''}
        </div>
        <span class="tc-time">${timeAgo(t.created_at)}</span>
      </div>
      <div class="tc-desc">${t.description}</div>
      <div class="tc-reporter">דווח ע״י <strong>${t.name}</strong></div>
      ${t.note ? `<div class="tc-note">📝 ${t.note}</div>` : ''}
      <div>
        ${!t.done
          ? `<button class="tc-btn done-btn" onclick="openModal(${t.id})">✓ סמן כטופל</button>`
          : `<button class="tc-btn" onclick="doReopen(${t.id})">↩ פתח מחדש</button>`
        }
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  pendingId = id;
  document.getElementById('modal-desc').textContent = t.description;
  document.getElementById('modal-note').value = '';
  document.getElementById('note-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-note').focus(), 100);
}

function closeModal() {
  document.getElementById('note-modal').style.display = 'none';
  pendingId = null;
}

async function confirmDone() {
  if (!pendingId) return;
  const note = document.getElementById('modal-note').value.trim();
  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = 'שומר...';
  btn.disabled = true;

  const ticket = tickets.find(t => t.id === pendingId);

  const { error } = await sb.from('tickets')
    .update({ done: true, note: note || null })
    .eq('id', pendingId);

  btn.textContent = '✓ סמן כטופל';
  btn.disabled = false;
  if (error) { alert('שגיאה: ' + error.message); return; }

  // שלח מייל אם יש כתובת
  if (ticket && ticket.email) {
    try {
      await fetch('https://ikoaeeaqfglqdouxyvrp.supabase.co/functions/v1/send-completion-email', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlrb2FlZWFxZmdscWRvdXh5dnJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTI0NjQsImV4cCI6MjA5MjI2ODQ2NH0.G1JZtwLPog-4MwvC9we7RESzRi6QZRq8ZJa5cgBMLY8'
        },
        body: JSON.stringify({
          email: ticket.email,
          name: ticket.name,
          description: ticket.description,
          note: note || '',
          type: 'maint'
        })
      });
    } catch(e) { console.warn('שגיאת מייל:', e); }
  }

  closeModal();
  await load();
}

async function doReopen(id) {
  const { error } = await sb.from('tickets')
    .update({ done: false, note: null })
    .eq('id', id);
  if (error) { alert('שגיאה: ' + error.message); return; }
  await load();
}

async function clearDone() {
  if (!confirm('למחוק את כל הקריאות הסגורות?')) return;
  const { error } = await sb.from('tickets').delete().eq('type','maint').eq('done', true);
  if (error) { alert('שגיאה: ' + error.message); return; }
  await load();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

sb.channel('maint-live')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets', filter: 'type=eq.maint' }, load)
  .subscribe();

load();
setInterval(() => load(), 600000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
